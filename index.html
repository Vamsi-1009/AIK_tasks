<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AIK Learning Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;
  --bg2:#0d0f1a;
  --bg3:#131625;
  --card:#151829;
  --card2:#1a1e32;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.11);
  --border3:rgba(255,255,255,0.18);
  --text:#eceaf5;
  --muted:#6b6d85;
  --muted2:#9092ab;
  --accent:#7c6aff;
  --accent2:#a599ff;
  --accent-glow:rgba(124,106,255,0.18);
  --green:#2dd4a0;
  --green-bg:rgba(45,212,160,0.1);
  --amber:#f5a623;
  --amber-bg:rgba(245,166,35,0.1);
  --red:#f0645a;
  --red-bg:rgba(240,100,90,0.1);
  --teal:#22d3ee;
  --teal-bg:rgba(34,211,238,0.1);
  --pink:#e879a4;
  --pink-bg:rgba(232,121,164,0.1);
  --purple:#a78bfa;
  --purple-bg:rgba(167,139,250,0.1);
  --r:10px;--rl:16px;--rxl:22px;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --transition:0.22s cubic-bezier(0.4,0,0.2,1);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.6;min-height:100vh;overflow-x:hidden}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{0%{transform:scale(0.7);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes progressFill{from{width:0}to{width:var(--w)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 24px 4px var(--accent-glow)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

/* ── TOPBAR ── */
.topbar{
  background:rgba(7,8,15,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 28px;
  display:flex;align-items:center;gap:14px;
  height:60px;position:sticky;top:0;z-index:200;
}
.logo{font-family:var(--mono);font-weight:600;font-size:16px;color:var(--accent2);letter-spacing:-0.5px;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
.topbar-sep{width:1px;height:22px;background:var(--border2)}
.topbar-sub{color:var(--muted);font-size:12px;letter-spacing:0.3px}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.progress-ring-wrap{display:flex;align-items:center;gap:10px}
.progress-text{font-size:12px;font-family:var(--mono);color:var(--accent2)}
.streak-badge{background:var(--amber-bg);border:1px solid rgba(245,166,35,0.25);border-radius:20px;padding:4px 12px;font-size:11px;font-family:var(--mono);color:var(--amber);display:flex;align-items:center;gap:5px}
.streak-icon{width:8px;height:8px;background:var(--amber);border-radius:50%;animation:pulse 1.5s infinite}

/* ── LAYOUT ── */
.app{display:flex;height:calc(100vh - 60px);overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:240px;min-width:240px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  overflow-y:auto;
  padding:20px 0;
  display:flex;flex-direction:column;gap:4px;
}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sidebar-section-label{
  font-size:10px;font-family:var(--mono);color:var(--muted);
  letter-spacing:1.8px;text-transform:uppercase;
  padding:12px 16px 6px;
}
.nav-item{
  margin:0 10px;
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  border-radius:10px;
  cursor:pointer;
  transition:all var(--transition);
  color:var(--muted2);font-size:13px;
  border:1px solid transparent;
  user-select:none;
}
.nav-item:hover{background:var(--bg3);color:var(--text);border-color:var(--border)}
.nav-item.active{background:var(--accent-glow);color:var(--accent2);border-color:rgba(124,106,255,0.25)}
.nav-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:transform var(--transition)}
.nav-item:hover .nav-icon{transform:scale(1.1)}
.nav-item.active .nav-icon{animation:float 3s ease-in-out infinite}
.nav-label{flex:1;font-weight:500}
.nav-count{font-size:11px;font-family:var(--mono);padding:2px 7px;border-radius:8px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);transition:all var(--transition)}
.nav-item.active .nav-count{background:rgba(124,106,255,0.2);color:var(--accent2);border-color:rgba(124,106,255,0.3)}

/* progress bar per category */
.cat-progress{height:2px;background:var(--border);border-radius:1px;margin:0 16px 12px;overflow:hidden}
.cat-progress-fill{height:100%;background:var(--accent);border-radius:1px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}

/* overall progress section */
.sidebar-progress-block{margin:0 10px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:12px}
.spb-label{font-size:11px;color:var(--muted);margin-bottom:8px}
.spb-numbers{display:flex;align-items:baseline;gap:4px;margin-bottom:8px}
.spb-done{font-size:22px;font-weight:600;color:var(--accent2);font-family:var(--mono)}
.spb-total{font-size:13px;color:var(--muted)}
.spb-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.spb-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--teal));border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}

/* ── MAIN ── */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── HEADER STRIP ── */
.main-header{
  padding:24px 28px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  position:sticky;top:0;z-index:100;
}
.search-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:0 14px;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.search-bar:focus-within{border-color:rgba(124,106,255,0.5);box-shadow:0 0 0 3px var(--accent-glow)}
.search-icon{color:var(--muted);font-size:14px;flex-shrink:0}
.search-input{background:none;border:none;outline:none;color:var(--text);font-family:var(--font);font-size:13px;padding:10px 0;flex:1;width:100%}
.search-input::placeholder{color:var(--muted)}
.filter-row{display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap}
.filter-chip{
  font-size:12px;font-family:var(--mono);padding:5px 13px;
  border-radius:20px;border:1px solid var(--border2);
  background:transparent;color:var(--muted);
  cursor:pointer;transition:all var(--transition);
  white-space:nowrap;
}
.filter-chip:hover{background:var(--bg3);color:var(--text);border-color:var(--border3)}
.filter-chip.active{background:var(--accent-glow);border-color:rgba(124,106,255,0.4);color:var(--accent2)}
.sort-select{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 10px;color:var(--muted);font-size:12px;font-family:var(--mono);cursor:pointer;outline:none;margin-left:auto}
.sort-select:hover{border-color:var(--border3);color:var(--text)}

/* ── CONTENT ── */
.content{padding:24px 28px;display:flex;flex-direction:column;gap:28px}

/* ── PHASE GROUP ── */
.phase-group{animation:fadeUp 0.4s ease both}
.phase-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:14px;padding:12px 16px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rl);
  border-left:3px solid var(--accent);
}
.phase-emoji{font-size:18px;line-height:1}
.phase-name{font-size:14px;font-weight:600;color:var(--text)}
.phase-desc{font-size:12px;color:var(--muted);margin-top:1px}
.phase-meta{margin-left:auto;display:flex;align-items:center;gap:10px}
.phase-pill{
  font-size:11px;font-family:var(--mono);
  padding:3px 10px;border-radius:10px;
  background:var(--bg3);color:var(--muted2);
  border:1px solid var(--border);
}
.phase-done-count{font-size:11px;color:var(--green);font-family:var(--mono)}

/* ── TASK CARD ── */
.task-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--rl);
  overflow:hidden;
  transition:border-color var(--transition),transform var(--transition),box-shadow var(--transition);
  cursor:pointer;
  margin-bottom:8px;
  animation:fadeUp 0.35s ease both;
}
.task-card:hover{border-color:var(--border3);transform:translateY(-1px);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.task-card.expanded{border-color:rgba(124,106,255,0.35);box-shadow:0 0 0 1px rgba(124,106,255,0.1)}
.task-card.done-card{opacity:0.55}
.task-card.done-card:hover{opacity:0.8}

.task-top{display:flex;align-items:center;gap:12px;padding:14px 16px}
.task-order{
  width:28px;height:28px;border-radius:8px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-family:var(--mono);color:var(--muted);
  flex-shrink:0;font-weight:600;
}
.task-card.expanded .task-order,.task-card:hover .task-order{background:var(--accent-glow);border-color:rgba(124,106,255,0.3);color:var(--accent2)}
.task-mid{flex:1;min-width:0}
.task-title-row{display:flex;align-items:flex-start;gap:8px}
.task-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;flex:1}
.task-card.done-card .task-title{text-decoration:line-through;color:var(--muted)}
.prio-badge{
  font-size:10px;font-family:var(--mono);font-weight:600;
  padding:2px 8px;border-radius:6px;
  white-space:nowrap;flex-shrink:0;margin-top:1px;
  letter-spacing:0.3px;
}
.prio-foundation{background:var(--green-bg);color:var(--green);border:1px solid rgba(45,212,160,0.2)}
.prio-core{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
.prio-advanced{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,166,35,0.2)}
.prio-project{background:var(--teal-bg);color:var(--teal);border:1px solid rgba(34,211,238,0.2)}

.task-tags-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.tag{font-size:10px;font-family:var(--mono);padding:2px 6px;border-radius:5px;background:var(--bg3);color:var(--muted);border:1px solid var(--border)}
.task-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.done-check{
  width:22px;height:22px;border-radius:50%;
  border:1.5px solid var(--border3);
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);cursor:pointer;
  flex-shrink:0;
}
.done-check:hover{border-color:var(--green);background:var(--green-bg)}
.done-check.checked{background:var(--green);border-color:var(--green);animation:popIn 0.3s ease}
.done-check svg{opacity:0;transition:opacity 0.15s}
.done-check.checked svg{opacity:1}
.expand-arrow{
  width:24px;height:24px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);transition:all var(--transition);
  background:var(--bg3);border:1px solid var(--border);
}
.task-card:hover .expand-arrow,.task-card.expanded .expand-arrow{color:var(--text);background:var(--bg2)}
.expand-arrow svg{transition:transform var(--transition)}
.task-card.expanded .expand-arrow svg{transform:rotate(90deg)}

/* ── EXPANDED DETAIL ── */
.task-detail{
  border-top:1px solid var(--border);
  display:grid;grid-template-rows:0fr;
  transition:grid-template-rows 0.32s cubic-bezier(0.4,0,0.2,1);
}
.task-card.expanded .task-detail{grid-template-rows:1fr}
.task-detail-inner{overflow:hidden}
.task-detail-body{padding:20px 18px;display:grid;grid-template-columns:1fr 1fr;gap:20px;background:var(--bg2)}
@media(max-width:640px){.task-detail-body{grid-template-columns:1fr}}

.detail-block{}
.detail-block-title{
  font-size:10px;font-family:var(--mono);color:var(--muted);
  text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.detail-block-title::before{content:'';display:block;width:10px;height:2px;border-radius:1px;background:var(--accent)}

.concept-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:14px;
  font-size:13px;color:var(--muted2);line-height:1.7;
}
.concept-card strong{color:var(--teal);font-weight:500}
.concept-card code{font-family:var(--mono);font-size:11px;background:rgba(124,106,255,0.12);padding:1px 5px;border-radius:4px;color:var(--accent2)}

.steps-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.step-item{display:flex;gap:10px;align-items:flex-start;padding:8px 10px;border-radius:8px;transition:background var(--transition)}
.step-item:hover{background:var(--bg3)}
.step-num{
  width:20px;height:20px;border-radius:6px;
  background:var(--bg3);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-family:var(--mono);color:var(--muted);
  flex-shrink:0;margin-top:1px;transition:all var(--transition);
}
.step-item:hover .step-num{background:var(--accent-glow);color:var(--accent2);border-color:rgba(124,106,255,0.3)}
.step-text{font-size:12px;color:var(--muted2);line-height:1.6}
.step-text code{font-family:var(--mono);font-size:11px;background:var(--bg3);padding:1px 5px;border-radius:4px;color:var(--accent2)}

.mark-row{
  display:flex;align-items:center;gap:10px;
  margin-top:14px;padding:10px 12px;
  border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);cursor:pointer;
  transition:all var(--transition);
}
.mark-row:hover{border-color:rgba(45,212,160,0.3);background:var(--green-bg)}
.mark-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;transition:all var(--transition);display:flex;align-items:center;justify-content:center}
.mark-row:hover .mark-check{border-color:var(--green)}
.mark-check.checked{background:var(--green);border-color:var(--green);animation:popIn 0.3s ease}
.mark-label{font-size:12px;color:var(--muted);transition:color var(--transition)}
.mark-row:hover .mark-label{color:var(--text)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:0.4}
.empty-text{font-size:14px;line-height:1.6}

/* ── STAT CARDS at top ── */
.stats-strip{
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  padding:20px 28px 0;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rl);padding:14px 16px;
  transition:border-color var(--transition),transform var(--transition);
  animation:fadeUp 0.3s ease both;
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-value{font-size:24px;font-weight:600;font-family:var(--mono);color:var(--text);line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-top:5px}
.stat-bar{height:3px;background:var(--border2);border-radius:2px;margin-top:10px;overflow:hidden}
.stat-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── DONE CONFETTI ── */
@keyframes confetti{
  0%{transform:translateY(0) rotate(0);opacity:1}
  100%{transform:translateY(-60px) rotate(360deg);opacity:0}
}
.confetti-dot{position:absolute;pointer-events:none;border-radius:50%;animation:confetti 0.7s ease forwards}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    AIK Tasks
  </div>
  <div class="topbar-sep"></div>
  <div class="topbar-sub">Learning Roadmap</div>
  <div class="topbar-right">
    <div class="progress-ring-wrap">
      <svg width="32" height="32" viewBox="0 0 32 32">
        <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="3"/>
        <circle id="ring-circle" cx="16" cy="16" r="12" fill="none" stroke="#7c6aff" stroke-width="3"
          stroke-dasharray="75.4" stroke-dashoffset="75.4" stroke-linecap="round"
          transform="rotate(-90 16 16)" style="transition:stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1)"/>
      </svg>
      <span class="progress-text" id="progress-text">0 / 0</span>
    </div>
    <div class="streak-badge"><div class="streak-icon"></div><span id="streak-text">0 done today</span></div>
  </div>
</div>

<div class="app">
  <nav class="sidebar" id="sidebar">
    <div style="padding:0 10px 4px">
      <div class="sidebar-progress-block">
        <div class="spb-label">Overall progress</div>
        <div class="spb-numbers">
          <span class="spb-done" id="spb-done">0</span>
          <span class="spb-total" id="spb-total">/ 0 tasks</span>
        </div>
        <div class="spb-bar"><div class="spb-fill" id="spb-fill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="sidebar-section-label" style="margin-top:16px">Browse</div>
    <div id="nav-items"></div>
  </nav>

  <div class="main">
    <div class="main-header">
      <div class="search-bar">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input class="search-input" id="search" placeholder="Search tasks, tags, concepts…" oninput="render()"/>
      </div>
      <div class="filter-row">
        <button class="filter-chip active" id="fc-all" onclick="setStatus('all')">All tasks</button>
        <button class="filter-chip" id="fc-todo" onclick="setStatus('todo')">To do</button>
        <button class="filter-chip" id="fc-done" onclick="setStatus('done')">Completed</button>
        <div style="height:18px;width:1px;background:var(--border2)"></div>
        <button class="filter-chip" onclick="setStatus('foundation')" id="fc-foundation">Foundation</button>
        <button class="filter-chip" onclick="setStatus('core')" id="fc-core">Core</button>
        <button class="filter-chip" onclick="setStatus('advanced')" id="fc-advanced">Advanced</button>
        <button class="filter-chip" onclick="setStatus('project')" id="fc-project">Project</button>
      </div>
    </div>

    <div class="stats-strip" id="stats-strip"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<script>
const TASKS=[
  {id:1,order:1,phase:"Phase 1 — Foundation",phaseIdx:1,cat:"systems",prio:"foundation",
   title:"Understand file systems — naming, storage, OS disk location, space allocation",
   tags:["os","filesystem","inode","blocks"],
   concept:"A <strong>file system</strong> organises bytes on disk into named files and directories. The OS uses <strong>inodes</strong> (index nodes) that store file metadata and pointers to data blocks. Files aren't stored as one contiguous stream — they're spread across fixed-size blocks (~4KB each). The inode tracks every block's location, so the OS can reassemble your file no matter where it lives on disk.",
   howto:[
     "Read about FAT32, ext4, NTFS — how each names and locates files",
     "Learn what an inode is: permissions, size, timestamps, and block pointers",
     "Understand block allocation: a 1-byte file still uses a full 4KB block",
     "Run: <code>ls -li</code> to see inode numbers, <code>df -h</code> for disk usage",
     "Study HFSX vs HFS+ case sensitivity differences",
     "Research: what happens when an inode is corrupted or deleted?"
   ]},
  {id:2,order:2,phase:"Phase 1 — Foundation",phaseIdx:1,cat:"systems",prio:"foundation",
   title:"ASCII chart, UTF-8, UTF-16 — how text is encoded and stored as bytes",
   tags:["encoding","ascii","utf8","binary","hex"],
   concept:"Every character you type is actually a <strong>number</strong>. ASCII maps 128 characters to bytes 0–127. UTF-8 extends this to all Unicode, using 1–4 bytes per character. UTF-16 uses 2–4 bytes. Understanding encoding explains why <code>'A'</code> is <code>0x41</code>, and why lowercase letters are exactly 32 above uppercase in ASCII — by design.",
   howto:[
     "Write a C program to print the full ASCII chart (0–127)",
     "Use <code>xxd file.txt</code> to see hex values of text you write",
     "Save 'ABCD' to a file — verify: hex = 41 42 43 44",
     "Understand why 'a' - 'A' = 32 = 0x20 in ASCII",
     "Explore file formats: html, xml, markdown, json, txt — all are plain text",
     "Experiment with UTF-8: type a non-ASCII character, see how many bytes it uses"
   ]},
  {id:3,order:3,phase:"Phase 1 — Foundation",phaseIdx:1,cat:"systems",prio:"foundation",
   title:"Absolute path vs relative path — master filesystem navigation",
   tags:["linux","path","terminal","cd"],
   concept:"An <strong>absolute path</strong> starts from root: <code>/home/user/file.txt</code>. A <strong>relative path</strong> starts from where you are: <code>../file.txt</code>. Every terminal command you run uses one of these. The symbols <code>.</code> means current directory and <code>..</code> means parent directory.",
   howto:[
     "Open terminal, run <code>pwd</code> — that's your current absolute path",
     "Navigate with <code>cd ..</code> (relative) then <code>cd /home/user</code> (absolute)",
     "Create a directory tree and navigate with both path styles",
     "Try: <code>cat ./file.txt</code> vs <code>cat /full/path/to/file.txt</code>",
     "Understand <code>~</code> as shortcut for your home directory"
   ]},
  {id:4,order:4,phase:"Phase 1 — Foundation",phaseIdx:1,cat:"c",prio:"foundation",
   title:"C declarations, commenting, errors and warnings — the compiler's language",
   tags:["c","syntax","compiler","errors","warnings"],
   concept:"In C, <strong>declarations</strong> tell the compiler a variable's type before you use it. Comments are <code>// single line</code> or <code>/* multi-line */</code>. The compiler produces <strong>errors</strong> (won't compile) and <strong>warnings</strong> (compiles but may misbehave). Reading compiler output clearly is itself a critical skill.",
   howto:[
     "Write a C file with int, char, float declarations — comment each one",
     "Comment out a declaration — compile and record the exact error message",
     "Use <code>gcc -Wall</code> to see all warnings, even for valid code",
     "Write code with an uninitialised variable — observe the warning",
     "Document what compiler message each type of mistake produces"
   ]},
  {id:5,order:5,phase:"Phase 1 — Foundation",phaseIdx:1,cat:"tools",prio:"foundation",
   title:"Explore grep and find commands — search file contents and filesystem",
   tags:["linux","grep","find","cli","search"],
   concept:"<strong>grep</strong> searches file contents by pattern. <strong>find</strong> searches the filesystem for files by name, type, size, or date. Together they cover nearly every 'I need to find something' situation. These two commands are used every single day by professional developers.",
   howto:[
     "Run <code>man grep</code> and <code>man find</code> — read the first two pages",
     "Use <code>grep -r 'hello' .</code> to search all files recursively",
     "Use <code>find . -name '*.c'</code> to find all C files",
     "Combine: <code>find . -name '*.c' | xargs grep 'main'</code>",
     "Try grep with: -n (line numbers), -i (case insensitive), -v (invert match)",
     "Use find with: -mtime (modified time), -size, -type f/d"
   ]},
  {id:6,order:6,phase:"Phase 1 — Foundation",phaseIdx:1,cat:"tools",prio:"foundation",
   title:"Create custom binaries and add folder to PATH — make your own commands",
   tags:["linux","bash","path","binary","bashrc"],
   concept:"When you type a command, the shell searches directories listed in <strong>$PATH</strong> in order. By adding your own folder to PATH via <code>.bashrc</code>, your compiled programs become available system-wide — just like <code>ls</code> or <code>grep</code>. This is how real tools are installed.",
   howto:[
     "Write a simple C program (e.g. prints 'hello from mytool')",
     "Compile: <code>gcc hello.c -o myhello</code>",
     "Create: <code>mkdir ~/mybin</code> and move the binary there",
     "Edit <code>~/.bashrc</code>: add <code>export PATH=$PATH:~/mybin</code>",
     "Run <code>source ~/.bashrc</code> then test <code>myhello</code> from 3 different directories",
     "Verify with <code>which myhello</code> and <code>echo $PATH</code>"
   ]},
  {id:7,order:7,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"core",
   title:"Write a bill program — item name, quantity, cost per item, total",
   tags:["c","stdio","struct","printf","program"],
   concept:"This task practises C fundamentals: strings, floats, loops, and formatted output with <code>printf</code>. The <code>fprintf</code> function writes to files — combining it with <code>fopen</code>/<code>fclose</code> means you can generate a real bill file on disk.",
   howto:[
     "Declare a struct: <code>char name[50]; int qty; float price;</code>",
     "Use <code>scanf</code> to take 3 items as input from the user",
     "Calculate: total = qty * price per item, then sum all for grand total",
     "Use printf with: %s, %d, %f, %.2f format specifiers",
     "Extension: save the bill to file using <code>fopen</code>, <code>fprintf</code>, <code>fclose</code>"
   ]},
  {id:8,order:8,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"core",
   title:"Debug product_function.c — identify local variable addresses, return addresses, stack order",
   tags:["c","lldb","debugging","memory","stack","addresses"],
   concept:"Every function call creates a <strong>stack frame</strong>. Local variables live inside these frames at specific memory addresses. The <strong>return address</strong> is stored in the frame so the CPU knows where to jump after the function finishes. Stack frames grow downward in memory — higher addresses are earlier/deeper in the call stack.",
   howto:[
     "Compile with debug symbols: <code>gcc -g product_function.c -o product</code>",
     "Open in lldb: <code>lldb ./product</code>",
     "Set breakpoint: <code>b function_name</code>, then run: <code>r</code>",
     "Use <code>frame variable</code> to see all local variables",
     "Use <code>p &variable_name</code> to print each variable's memory address",
     "Use <code>register read</code> to see return address register",
     "Observe: are addresses increasing or decreasing deeper in the call?"
   ]},
  {id:9,order:9,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"core",
   title:"Debug uppercase converter — print memory of char variable at every line",
   tags:["c","lldb","memory","ascii","debugging","char"],
   concept:"The expression <code>ch - ('a' - 'A')</code> converts lowercase to uppercase because 'a' - 'A' = 32 = 0x20. Subtracting 32 from any lowercase ASCII letter gives its uppercase equivalent. This works because ASCII was intentionally designed with exactly this offset between cases.",
   howto:[
     "Write: <code>char ch; scanf(\"%c\",&ch); ch=ch-('a'-'A'); printf(\"%c\",ch);</code>",
     "Compile with <code>-g</code> flag for debug symbols",
     "In lldb: set breakpoint at each line: <code>b filename.c:line_number</code>",
     "After each step: <code>memory read &ch</code> — see raw bytes",
     "Step with <code>n</code> (next line) and observe how memory value changes",
     "Verify: 'a' = 0x61, 'A' = 0x41, difference = 0x20 = 32"
   ]},
  {id:10,order:10,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"core",
   title:"Use input/output redirection for sum.c — connect files to stdin/stdout",
   tags:["c","bash","redirection","io","stdin","stdout"],
   concept:"<strong>Redirection</strong> connects files to a program's standard streams. <code>< input.txt</code> feeds a file as keyboard input. <code>> output.txt</code> captures printed output. <code>2> error.txt</code> captures errors. This is how you automate programs that normally require interactive input.",
   howto:[
     "Write sum.c that reads N numbers using scanf and prints their sum",
     "Create input.txt with numbers on separate lines",
     "Run: <code>./sum < input.txt</code> — reads from file instead of keyboard",
     "Run: <code>./sum < input.txt > output.txt</code> — output goes to file",
     "Try: <code>./sum < input.txt > output.txt 2> error.txt</code>",
     "Verify: <code>cat output.txt</code>"
   ]},
  {id:11,order:11,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"core",
   title:"Print bytes of an integer in little-endian and big-endian format",
   tags:["c","endianness","binary","bitwise","hex","memory"],
   concept:"<strong>Little-endian</strong>: least significant byte stored first in memory (used by x86, ARM). <strong>Big-endian</strong>: most significant byte first (used in network protocols). Storing 0x12345678: little-endian in memory reads 78 56 34 12. This distinction matters when sharing binary data between systems or reading raw files.",
   howto:[
     "Declare: <code>int n = 0x12345678;</code> then cast to <code>char*</code>",
     "Loop through <code>sizeof(int)</code> bytes, print each: <code>printf(\"0x%02x \", ptr[i])</code>",
     "Observe the order — that's your system's byte order (likely little-endian)",
     "Print big-endian: loop backwards from <code>sizeof(int)-1</code> to 0",
     "Verify: store 0x44434241 in memory, print as chars — should show 'ABCD'"
   ]},
  {id:12,order:12,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"advanced",
   title:"Memory segments: verify global/static in .data section using readelf and gdb",
   tags:["c","memory","elf","readelf","segments","bss","data"],
   concept:"A compiled C binary has <strong>segments</strong>: <code>.text</code> (code), <code>.data</code> (initialised globals/statics), <code>.bss</code> (uninitialised globals), <code>stack</code> (locals), <code>heap</code> (malloc). Global and static variables persist for the entire program lifetime. Local variables vanish when their function returns.",
   howto:[
     "Write C with: global <code>int g=10;</code>, static <code>int s=20;</code>, local <code>int l=30;</code>",
     "Call the function twice — verify static variable retains its value",
     "Compile: <code>gcc -g prog.c -o prog</code>",
     "Run <code>readelf -a prog</code> — look for .data and .bss sections",
     "In lldb: <code>p &g</code> vs <code>p &l</code> — notice the address ranges differ dramatically",
     "Find data segment address from <code>/proc/PID/maps</code> during execution"
   ]},
  {id:13,order:13,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"advanced",
   title:"Typedef — create user-defined data types in C",
   tags:["c","typedef","struct","types"],
   concept:"<code>typedef</code> creates an alias for a type. <code>typedef unsigned char byte;</code> lets you write <code>byte x = 5;</code> instead of <code>unsigned char x = 5;</code>. Most importantly, <code>typedef struct{...} Point;</code> lets you use <code>Point</code> instead of <code>struct Point</code> everywhere — this is how real C code stays readable.",
   howto:[
     "<code>typedef int Meters;</code> — declare a variable of type Meters",
     "<code>typedef struct { float x; float y; } Point;</code> — create and use it",
     "<code>typedef char* String;</code> — see how it simplifies pointer declarations",
     "Understand: typedef is type-safe, #define is just text substitution",
     "Read struct usage in real Linux kernel headers like <code>linux/list.h</code>"
   ]},
  {id:14,order:14,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"advanced",
   title:"Compare preprocessed .i files with and without math.h — see what the compiler actually processes",
   tags:["c","compiler","preprocessor","clang","include"],
   concept:"The C compiler has 4 stages: <strong>preprocessor</strong> (expands #include → .i file), <strong>compiler</strong> (generates assembly → .s), <strong>assembler</strong> (machine code → .o), <strong>linker</strong> (combines .o → executable). The .i file shows exactly what code the compiler sees after all preprocessing.",
   howto:[
     "File 1: only <code>#include &lt;stdio.h&gt;</code> with a main function",
     "File 2: <code>#include &lt;stdio.h&gt;</code> and <code>#include &lt;math.h&gt;</code>",
     "Use clang: <code>clang -save-temps file1.c -o f1</code> (same for file2)",
     "Compare: <code>wc -l file1.i</code> vs <code>wc -l file2.i</code>",
     "math.h adds thousands of lines of declarations — find where they start",
     "Find where your own code begins in the .i file"
   ]},
  {id:15,order:15,phase:"Phase 2 — C Programming",phaseIdx:2,cat:"c",prio:"project",
   title:"Create binary on Ubuntu, push to GitHub, pull on local machine, inspect with hexedit",
   tags:["c","github","binary","hexedit","elf","git"],
   concept:"A compiled binary is an <strong>ELF file</strong> (Executable and Linkable Format) on Linux. It starts with magic bytes: <code>7f 45 4c 46</code> (which is '\\x7fELF'). <code>hexedit</code> lets you see and modify raw bytes. Pushing a binary to GitHub works — git stores it as a blob, not text.",
   howto:[
     "Compile on Ubuntu: <code>gcc sum.c -o sum.exe</code>",
     "Init repo: <code>git add sum.exe && git commit -m 'add binary'</code>",
     "Push: <code>git push origin main</code>",
     "On local: <code>git pull</code> to download",
     "Try running: <code>./sum.exe</code> — observe if architectures differ",
     "Open with hexedit: first 4 bytes should be 7f 45 4c 46 (ELF magic)"
   ]},
  {id:16,order:16,phase:"Phase 3 — Python",phaseIdx:3,cat:"python",prio:"core",
   title:"Experiments with classes, objects, instances in Python — understand OOP",
   tags:["python","oop","class","instance","object"],
   concept:"A <strong>class</strong> is a blueprint. An <strong>object</strong> is anything built from it. An <strong>instance</strong> is a specific object in memory. <code>class Dog:</code> defines the blueprint; <code>rex = Dog()</code> creates an instance. Each instance has its own data (attributes) but shares methods with all other instances of the same class.",
   howto:[
     "Define: <code>class Car: def __init__(self, brand): self.brand = brand</code>",
     "Create 3 instances: <code>car1=Car('Toyota'), car2=Car('Honda')</code>",
     "Use <code>type()</code> and <code>isinstance()</code> to inspect objects",
     "Add methods to the class, call them on different instances",
     "Use Python REPL to experiment: define and call 2 functions 3 times each",
     "Use <code>dir(obj)</code> to see all attributes and methods"
   ]},
  {id:17,order:17,phase:"Phase 3 — Python",phaseIdx:3,cat:"python",prio:"core",
   title:"Debug Python sum.py using PDB — step through code and inspect every variable",
   tags:["python","pdb","debugging","step","locals"],
   concept:"<strong>PDB</strong> (Python Debugger) is Python's built-in debugger — it works like lldb but for Python bytecode. You can pause execution, step line by line, inspect any variable, and even change values mid-run. It's the fastest way to understand what a Python program is actually doing.",
   howto:[
     "Add <code>import pdb; pdb.set_trace()</code> at top of sum.py",
     "Run the file: <code>python sum.py</code> — pauses at the trace point",
     "Use: <code>n</code> (next line), <code>s</code> (step into), <code>c</code> (continue)",
     "Print any variable: <code>p variable_name</code>",
     "See code context: <code>l</code> | Call stack: <code>bt</code>",
     "Inside a function: try <code>locals()</code> and <code>args()</code>"
   ]},
  {id:18,order:18,phase:"Phase 3 — Python",phaseIdx:3,cat:"python",prio:"core",
   title:"Write Python script to connect to SQLite and execute flight database queries",
   tags:["python","sqlite","database","sql","script"],
   concept:"Python's <code>sqlite3</code> module lets you connect to a .db file and run SQL queries in a few lines. The pattern: <strong>connect → create cursor → execute query → fetch results → close</strong>. This is the foundation of every database-driven Python application.",
   howto:[
     "<code>import sqlite3; conn = sqlite3.connect('flights.db')</code>",
     "<code>cursor = conn.cursor()</code>",
     "<code>cursor.execute('SELECT * FROM flights WHERE origin=?', ('VTZ',))</code>",
     "<code>rows = cursor.fetchall()</code>",
     "<code>for row in rows: print(row)</code>",
     "<code>conn.close()</code> — always close the connection",
     "Extension: add a new flight from Vizag with 60 min duration"
   ]},
  {id:19,order:19,phase:"Phase 3 — Python",phaseIdx:3,cat:"python",prio:"advanced",
   title:"View Python bytecode disassembly — understand how Python compiles your code",
   tags:["python","bytecode","dis","repl","compilation"],
   concept:"Python compiles your code to <strong>bytecode</strong> before running it — a set of instructions for the Python Virtual Machine (PVM). You can see this using the <code>dis</code> module. This explains why Python is slower than C (bytecode vs machine code) but faster to develop with.",
   howto:[
     "Write a sample.py: <code>num1=2; num2=3; num1=num1+num2; print(num1)</code>",
     "Import and use dis: <code>import dis; dis.dis(your_function)</code>",
     "From terminal: <code>python3 -m dis yourfile.py</code>",
     "Identify: LOAD_FAST, BINARY_ADD, RETURN_VALUE instructions",
     "Write Python code that intentionally generates errors — run and observe",
     "Compare disassembly of a simple function vs a complex one"
   ]},
  {id:20,order:20,phase:"Phase 4 — Networking & Web",phaseIdx:4,cat:"networking",prio:"core",
   title:"HTTP vs HTTPie — understand the HTTP protocol, use Postman for API testing",
   tags:["http","api","postman","httpie","networking","request"],
   concept:"<strong>HTTP</strong> defines how clients and servers communicate. Every request has: method (GET/POST/PUT/DELETE), URL, headers, and optional body. Every response has: status code (200 OK, 404 Not Found, 500 Server Error), headers, and body. <strong>HTTPie</strong> and <strong>Postman</strong> let you send these requests without writing code.",
   howto:[
     "Install HTTPie: <code>sudo apt install httpie</code>",
     "GET request: <code>http GET https://jsonplaceholder.typicode.com/posts/1</code>",
     "Open Postman, create the same request visually",
     "Observe headers: Content-Type, Authorization, User-Agent",
     "Try a POST request with JSON body",
     "2xx = success, 4xx = client error, 5xx = server error — memorise this"
   ]},
  {id:21,order:21,phase:"Phase 4 — Networking & Web",phaseIdx:4,cat:"networking",prio:"core",
   title:"Client timeout experiment — server doesn't respond for 2 min, observe disconnect",
   tags:["networking","http","timeout","python","server"],
   concept:"A <strong>timeout</strong> is a safety valve: if a server doesn't respond within N seconds, the client gives up and closes the connection. Without timeouts, a client could wait forever for a crashed server. TCP itself has no timeout — it's the application layer (HTTP, your code) that enforces them.",
   howto:[
     "Start a Python Flask server with a breakpoint in <code>get_students()</code>",
     "From another terminal: <code>curl http://localhost:5000/students</code>",
     "In the debugger: hit the breakpoint, then do NOTHING — just wait",
     "After 2 minutes, observe curl timing out",
     "Check server logs: did the server detect the disconnect?",
     "Explore: <code>curl --max-time 10</code> to set explicit timeout"
   ]},
  {id:22,order:22,phase:"Phase 4 — Networking & Web",phaseIdx:4,cat:"networking",prio:"advanced",
   title:"Explore netcat and curl — send raw HTTP requests and observe TCP connections",
   tags:["networking","netcat","curl","http","tcp","raw"],
   concept:"<strong>netcat</strong> opens raw TCP connections with zero protocol overhead. You can manually type HTTP requests to a server character by character. <strong>curl -v</strong> shows all request and response headers — this is how you truly understand what HTTP looks like at the wire level.",
   howto:[
     "<code>nc -l 8080</code> on one terminal (listen mode)",
     "<code>nc localhost 8080</code> on another — type text, see it appear instantly",
     "Connect to a real server: <code>nc google.com 80</code> then type <code>GET / HTTP/1.0</code> + two Enters",
     "Same with curl: <code>curl -v http://google.com</code> — see all headers",
     "Use <code>curl -I</code> for headers-only, no body",
     "Run Python server, try to connect from a friend's browser — what happens?"
   ]},
  {id:23,order:23,phase:"Phase 4 — Networking & Web",phaseIdx:4,cat:"networking",prio:"advanced",
   title:"ed25519 SSH keys — how public/private key pairs are generated and used",
   tags:["security","encryption","ssh","ed25519","keys"],
   concept:"<strong>ed25519</strong> is an elliptic-curve algorithm used in modern SSH. A <strong>key pair</strong> has a private key (never share) and a public key (safe to share). Anyone with your public key can verify your signature. Only you with the private key can create that signature. SSH uses this for passwordless, cryptographically secure login.",
   howto:[
     "Generate: <code>ssh-keygen -t ed25519 -C 'your@email'</code>",
     "Inspect public key: <code>cat ~/.ssh/id_ed25519.pub</code>",
     "The private key is base64-encoded — view its structure with cat",
     "Copy public key to server: <code>ssh-copy-id user@server</code>",
     "Connect without password: <code>ssh user@server</code>",
     "Research: how long would a supercomputer take to brute-force ed25519?"
   ]},
  {id:24,order:24,phase:"Phase 4 — Networking & Web",phaseIdx:4,cat:"networking",prio:"core",
   title:"Explore HTML tags p, pre, br — understand the DOM tree",
   tags:["html","dom","web","tags","browser"],
   concept:"The <strong>DOM</strong> (Document Object Model) is the browser's in-memory tree representation of an HTML page. <code>&lt;p&gt;</code> creates a paragraph block. <code>&lt;pre&gt;</code> preserves whitespace with monospace font. <code>&lt;br&gt;</code> is an inline line break. JavaScript controls web pages by reading and modifying this DOM tree.",
   howto:[
     "Create an HTML file using all three tags, open in browser",
     "Open DevTools (F12) → Elements tab — see the DOM tree",
     "Right-click any element → Inspect to highlight it",
     "In Console: <code>document.querySelector('p').textContent = 'Hello'</code>",
     "Network tab: reload and observe the HTTP request for your HTML file",
     "Open browser inspector: clear Network tab, open a website, write down what you observe"
   ]},
  {id:25,order:25,phase:"Phase 5 — Tools & Workflow",phaseIdx:5,cat:"tools",prio:"core",
   title:"Explore VIM — normal/insert/visual modes, navigation, save and quit",
   tags:["vim","editor","linux","modes","terminal"],
   concept:"<strong>VIM</strong> has 3 main modes: <strong>Normal</strong> (default — for navigation), <strong>Insert</strong> (for typing — press <code>i</code>), <strong>Visual</strong> (for selecting — press <code>v</code>). The learning curve is steep, but every Linux developer needs at minimum: open, edit, save, and quit.",
   howto:[
     "Open a file: <code>vim filename.txt</code>",
     "Enter insert mode: press <code>i</code> — type something — press Esc",
     "Navigate in Normal mode: h (left) j (down) k (up) l (right)",
     "Save: <code>:w</code> | Quit: <code>:q</code> | Save+quit: <code>:wq</code> | Force quit: <code>:q!</code>",
     "Search: <code>/searchterm</code> then <code>n</code> for next match",
     "Undo: <code>u</code> | Redo: <code>Ctrl+r</code>"
   ]},
  {id:26,order:26,phase:"Phase 5 — Tools & Workflow",phaseIdx:5,cat:"tools",prio:"core",
   title:"Explore exiftool, xxd, readelf — inspect file metadata and binary structure",
   tags:["tools","binary","metadata","exif","readelf","xxd"],
   concept:"<strong>Metadata</strong> is data about data. A photo has metadata: camera model, GPS, timestamp. A binary has metadata: ELF header, architecture, compilation flags. Understanding metadata in different contexts (file, image, database, textbook index, array index) is a recurring theme across all of computing.",
   howto:[
     "<code>exiftool photo.jpg</code> — see all embedded metadata in an image",
     "<code>xxd file.bin | head -20</code> — hex dump of first 160 bytes",
     "<code>readelf -h myprogram</code> — ELF header: arch, entry point, section count",
     "<code>readelf -S myprogram</code> — all sections: .text, .data, .bss and their sizes",
     "Download an APK, rename to .zip, unzip and explore its directory structure",
     "Write down: what does index mean in a textbook vs a database vs an array?"
   ]},
  {id:27,order:27,phase:"Phase 5 — Tools & Workflow",phaseIdx:5,cat:"tools",prio:"core",
   title:"SSH — man ssh, port forwarding, handle files/folders with spaces in names",
   tags:["ssh","linux","networking","port-forwarding","terminal"],
   concept:"<strong>SSH</strong> creates an encrypted tunnel between two machines. Beyond remote login, SSH supports <strong>port forwarding</strong>: a local port tunnels to a remote service, letting you securely access databases or web apps running on remote servers as if they were local.",
   howto:[
     "<code>man ssh</code> — read the SYNOPSIS section, understand every flag",
     "Login: <code>ssh user@ip-address</code>",
     "Local port forward: <code>ssh -L 8080:localhost:3000 user@server</code>",
     "Handle spaces: use quotes <code>'my file.txt'</code> or escape <code>my\\ file.txt</code>",
     "<code>ls -la</code> to see hidden files, permissions, timestamps",
     "Stop and restart sshd: <code>sudo systemctl restart sshd</code>"
   ]},
  {id:28,order:28,phase:"Phase 5 — Tools & Workflow",phaseIdx:5,cat:"tools",prio:"core",
   title:"File I/O in C — fopen, fprintf, fclose, fwrite, fscanf functions",

  systems:{label:"Systems & OS",icon:"⬡",color:"#2dd4a0"},

  ai:{label:"AI & ML",icon:"◉",color:"#f0645a"},
  db:{label:"Databases",icon:"▣",color:"#a78bfa"}
};

const PHASES={
  1:{emoji:"🔧",desc:"Linux, filesystem, encoding, path basics"},
  2:{emoji:"⚙️",desc:"C language, debugging, memory, binaries"},
  3:{emoji:"🐍",desc:"OOP, debugging, database scripting"},
  4:{emoji:"🌐",desc:"HTTP, TCP, SSH, web fundamentals"},
  5:{emoji:"🛠️",desc:"VIM, binary tools, file I/O, GitHub"},
  6:{emoji:"🤖",desc:"LLMs, Transformers, Agents, RAG"},

  8:{emoji:"🚀",desc:"Open source, cloud, advanced projects"}

let currentCat='all', currentStatus='all';
let doneSet=new Set(JSON.parse(localStorage.getItem('aik_done')||'[]'));
let expanded=new Set();
let todayDone=parseInt(localStorage.getItem('aik_today_date')===new Date().toDateString()?localStorage.getItem('aik_today_done')||'0':'0');

function saveDone(){
  localStorage.setItem('aik_done',JSON.stringify([...doneSet]));
  const today=new Date().toDateString();
  if(localStorage.getItem('aik_today_date')!==today){
    localStorage.setItem('aik_today_date',today);
    localStorage.setItem('aik_today_done','0');
    todayDone=0;
  }
}

function updateStats(){
  const done=doneSet.size, total=TASKS.length;
  const pct=total>0?Math.round((done/total)*100):0;
  const circ=75.4;
  const offset=circ-((done/total)*circ);
  document.getElementById('ring-circle').style.strokeDashoffset=offset;
  document.getElementById('progress-text').textContent=done+' / '+total;
  document.getElementById('spb-done').textContent=done;
  document.getElementById('spb-total').textContent='/ '+total+' tasks';
  document.getElementById('spb-fill').style.width=pct+'%';
  document.getElementById('streak-text').textContent=todayDone+' done today';
}

function buildNav(){
  const container=document.getElementById('nav-items');
  let html='';
  Object.entries(CATS).forEach(([key,cat])=>{
    const count=key==='all'?TASKS.length:TASKS.filter(t=>t.cat===key).length;
    const catDone=key==='all'?doneSet.size:TASKS.filter(t=>t.cat===key&&doneSet.has(t.id)).length;
    const pct=count>0?Math.round((catDone/count)*100):0;
    html+=`<div class="nav-item ${currentCat===key?'active':''}" onclick="setCat('${key}')" data-cat="${key}">
      <div class="nav-icon" style="background:${cat.color}18;color:${cat.color}">${cat.icon}</div>
      <span class="nav-label">${cat.label}</span>
      <span class="nav-count">${count}</span>
    </div>`;
  });
  container.innerHTML=html;
}

function buildStatCards(){
  const total=TASKS.length, done=doneSet.size;
  const foundation=TASKS.filter(t=>t.prio==='foundation');
  const foundDone=foundation.filter(t=>doneSet.has(t.id)).length;
  const core=TASKS.filter(t=>t.prio==='core');
  const coreDone=core.filter(t=>doneSet.has(t.id)).length;

  document.getElementById('stats-strip').innerHTML=`
    <div class="stat-card" style="animation-delay:0s">
      <div class="stat-value" id="sc-done">${done}</div>
      <div class="stat-label">Tasks completed</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${total>0?Math.round(done/total*100):0}%;background:var(--accent)"></div></div>
    </div>
    <div class="stat-card" style="animation-delay:0.05s">
      <div class="stat-value">${total-done}</div>
      <div class="stat-label">Remaining</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${total>0?Math.round((total-done)/total*100):0}%;background:var(--muted)"></div></div>
    </div>
    <div class="stat-card" style="animation-delay:0.1s">
      <div class="stat-value" style="color:var(--green)">${foundDone}/${foundation.length}</div>
      <div class="stat-label">Foundation done</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${foundation.length>0?Math.round(foundDone/foundation.length*100):0}%;background:var(--green)"></div></div>
    </div>
    <div class="stat-card" style="animation-delay:0.15s">
      <div class="stat-value" style="color:var(--purple)">${coreDone}/${core.length}</div>
      <div class="stat-label">Core done</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${core.length>0?Math.round(coreDone/core.length*100):0}%;background:var(--purple)"></div></div>
    </div>`;
}

function setCat(cat){
  currentCat=cat;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  render();
}

function setStatus(s){
  const statusKeys=['all','todo','done'];
  const prioKeys=['foundation','core','advanced','project'];
  if(prioKeys.includes(s)){
    currentStatus=currentStatus===s?'all':s;
  } else {
    currentStatus=s;
  }
  ['all','todo','done','foundation','core','advanced','project'].forEach(k=>{
    const el=document.getElementById('fc-'+k);
    if(el) el.classList.toggle('active', currentStatus===k||(k==='all'&&currentStatus==='all'));
  });
  if(currentStatus==='all') document.getElementById('fc-all').classList.add('active');
  render();
}

function toggleExpand(id){
  if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card) card.classList.toggle('expanded', expanded.has(id));
}

function toggleDone(id,e){
  e.stopPropagation();
  const wasDone=doneSet.has(id);
  if(wasDone){doneSet.delete(id)}else{
    doneSet.add(id);
    todayDone++;
    localStorage.setItem('aik_today_done', todayDone);
    localStorage.setItem('aik_today_date', new Date().toDateString());
    confettiBurst(e.target);
  }
  saveDone();
  updateStats();
  buildNav();
  buildStatCards();
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card){
    card.classList.toggle('done-card',!wasDone);
    const checks=card.querySelectorAll('.done-check,.mark-check');
    checks.forEach(c=>c.classList.toggle('checked',!wasDone));
    const labels=card.querySelectorAll('.mark-label');
    labels.forEach(l=>l.textContent=wasDone?'Mark as done':'Completed ✓');
    const title=card.querySelector('.task-title');
    if(title) title.style.textDecoration=wasDone?'none':'line-through';
  }
}

function confettiBurst(el){
  const rect=el.getBoundingClientRect();
  const colors=['#7c6aff','#2dd4a0','#f5a623','#22d3ee','#e879a4'];
  for(let i=0;i<8;i++){
    const dot=document.createElement('div');
    dot.className='confetti-dot';
    const size=4+Math.random()*5;
    dot.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};left:${rect.left+rect.width/2+(-20+Math.random()*40)}px;top:${rect.top+window.scrollY}px;animation-delay:${Math.random()*0.2}s;animation-duration:${0.6+Math.random()*0.3}s`;
    document.body.appendChild(dot);
    setTimeout(()=>dot.remove(),1000);
  }
}

function getFiltered(){
  const search=document.getElementById('search').value.toLowerCase().trim();
  return TASKS.filter(t=>{
    if(currentCat!=='all'&&t.cat!==currentCat) return false;
    const prioFilter=['foundation','core','advanced','project'];
    if(prioFilter.includes(currentStatus)&&t.prio!==currentStatus) return false;
    if(currentStatus==='done'&&!doneSet.has(t.id)) return false;
    if(currentStatus==='todo'&&doneSet.has(t.id)) return false;
    if(search){
      const haystack=t.title.toLowerCase()+' '+t.tags.join(' ')+' '+t.phase.toLowerCase();
      if(!haystack.includes(search)) return false;
    }
    return true;
  });
}

function render(){
  const filtered=getFiltered();
  const container=document.getElementById('content');

  if(filtered.length===0){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">No tasks match your current filters.<br>Try clearing the search or changing the category.</div></div>`;
    return;
  }

  const phases={};
  filtered.forEach(t=>{
    if(!phases[t.phaseIdx]) phases[t.phaseIdx]={name:t.phase,tasks:[]};
    phases[t.phaseIdx].tasks.push(t);
  });

  let html='';
  Object.entries(phases).sort((a,b)=>a[0]-b[0]).forEach(([pi,group],gi)=>{
    const p=PHASES[pi]||{emoji:'📌',desc:''};
    const phDone=group.tasks.filter(t=>doneSet.has(t.id)).length;
    html+=`<div class="phase-group" style="animation-delay:${gi*0.06}s">
      <div class="phase-header">
        <div style="font-size:20px;line-height:1">${p.emoji}</div>
        <div>
          <div class="phase-name">${group.name}</div>
          <div class="phase-desc">${p.desc}</div>
        </div>
        <div class="phase-meta">
          <span class="phase-done-count">${phDone}/${group.tasks.length} done</span>
          <span class="phase-pill">do in order</span>
        </div>
      </div>`;
    group.tasks.forEach((t,ti)=>{
      const done=doneSet.has(t.id);
      const exp=expanded.has(t.id);
      const prioClass=`prio-${t.prio}`;
      const prioLabel=t.prio.toUpperCase();
      const catColor=CATS[t.cat]?.color||'#6b6d85';
      const stepHtml=t.howto.map((s,i)=>`<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('');
      const tagHtml=t.tags.slice(0,5).map(tg=>`<span class="tag">${tg}</span>`).join('');
      html+=`<div class="task-card ${exp?'expanded':''} ${done?'done-card':''}" data-id="${t.id}" onclick="toggleExpand(${t.id})" style="animation-delay:${gi*0.06+ti*0.03}s">
        <div class="task-top">
          <div class="task-order" style="color:${catColor}">${String(t.order).padStart(2,'0')}</div>
          <div class="task-mid">
            <div class="task-title-row">
              <div class="task-title" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${t.title}</div>
              <span class="prio-badge ${prioClass}">${prioLabel}</span>
            </div>
            <div class="task-tags-row">${tagHtml}</div>
          </div>
          <div class="task-right">
            <div class="done-check ${done?'checked':''}" onclick="toggleDone(${t.id},event)">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.2 7L8 3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="expand-arrow">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2L7 5L3 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>
        <div class="task-detail">
          <div class="task-detail-inner">
            <div class="task-detail-body">
              <div class="detail-block">
                <div class="detail-block-title">Core concept</div>
                <div class="concept-card">${t.concept}</div>
              </div>
              <div class="detail-block">
                <div class="detail-block-title">How to do it — step by step</div>
                <ul class="steps-list">${stepHtml}</ul>
                <div class="mark-row" onclick="toggleDone(${t.id},event)">
                  <div class="mark-check ${done?'checked':''}">
                    ${done?'<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.2 7L8 3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
                  </div>
                  <span class="mark-label">${done?'Completed ✓':'Mark as done when finished'}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

buildNav();
buildStatCards();
updateStats();
render();
</script>
</body>
</html>
