let currentCat='all', currentStatus='all';
let doneSet=new Set(JSON.parse(localStorage.getItem('aik_done')||'[]'));
let expanded=new Set();
let todayDone=parseInt(localStorage.getItem('aik_today_date')===new Date().toDateString()?localStorage.getItem('aik_today_done')||'0':'0');

function saveDone(){
  localStorage.setItem('aik_done',JSON.stringify([...doneSet]));
  const today=new Date().toDateString();
  if(localStorage.getItem('aik_today_date')!==today){
    localStorage.setItem('aik_today_date',today);
    localStorage.setItem('aik_today_done','0');
    todayDone=0;
  }
}

function updateStats(){
  const done=doneSet.size, total=TASKS.length;
  const pct=total>0?Math.round((done/total)*100):0;
  const circ=75.4;
  const offset=circ-((done/total)*circ);
  document.getElementById('ring-circle').style.strokeDashoffset=offset;
  document.getElementById('progress-text').textContent=done+' / '+total;
  document.getElementById('spb-done').textContent=done;
  document.getElementById('spb-total').textContent='/ '+total+' tasks';
  document.getElementById('spb-fill').style.width=pct+'%';
  document.getElementById('streak-text').textContent=todayDone+' done today';
}

function buildNav(){
  const container=document.getElementById('nav-items');
  let html='';
  Object.entries(CATS).forEach(([key,cat])=>{
    const count=key==='all'?TASKS.length:TASKS.filter(t=>t.cat===key).length;
    const catDone=key==='all'?doneSet.size:TASKS.filter(t=>t.cat===key&&doneSet.has(t.id)).length;
    const pct=count>0?Math.round((catDone/count)*100):0;
    html+=`<div class="nav-item ${currentCat===key?'active':''}" onclick="setCat('${key}')" data-cat="${key}">
      <div class="nav-icon" style="background:${cat.color}18;color:${cat.color}">${cat.icon}</div>
      <span class="nav-label">${cat.label}</span>
      <span class="nav-count">${count}</span>
    </div>`;
  });
  container.innerHTML=html;
}

function buildStatCards(){
  const total=TASKS.length, done=doneSet.size;
  const foundation=TASKS.filter(t=>t.prio==='foundation');
  const foundDone=foundation.filter(t=>doneSet.has(t.id)).length;
  const core=TASKS.filter(t=>t.prio==='core');
  const coreDone=core.filter(t=>doneSet.has(t.id)).length;

  document.getElementById('stats-strip').innerHTML=`
    <div class="stat-card" style="animation-delay:0s">
      <div class="stat-value" id="sc-done">${done}</div>
      <div class="stat-label">Tasks completed</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${total>0?Math.round(done/total*100):0}%;background:var(--accent)"></div></div>
    </div>
    <div class="stat-card" style="animation-delay:0.05s">
      <div class="stat-value">${total-done}</div>
      <div class="stat-label">Remaining</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${total>0?Math.round((total-done)/total*100):0}%;background:var(--muted)"></div></div>
    </div>
    <div class="stat-card" style="animation-delay:0.1s">
      <div class="stat-value" style="color:var(--green)">${foundDone}/${foundation.length}</div>
      <div class="stat-label">Foundation done</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${foundation.length>0?Math.round(foundDone/foundation.length*100):0}%;background:var(--green)"></div></div>
    </div>
    <div class="stat-card" style="animation-delay:0.15s">
      <div class="stat-value" style="color:var(--purple)">${coreDone}/${core.length}</div>
      <div class="stat-label">Core done</div>
      <div class="stat-bar"><div class="stat-fill" style="width:${core.length>0?Math.round(coreDone/core.length*100):0}%;background:var(--purple)"></div></div>
    </div>`;
}

function setCat(cat){
  currentCat=cat;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===cat));
  render();
}

function setStatus(s){
  const statusKeys=['all','todo','done'];
  const prioKeys=['foundation','core','advanced','project'];
  if(prioKeys.includes(s)){
    currentStatus=currentStatus===s?'all':s;
  } else {
    currentStatus=s;
  }
  ['all','todo','done','foundation','core','advanced','project'].forEach(k=>{
    const el=document.getElementById('fc-'+k);
    if(el) el.classList.toggle('active', currentStatus===k||(k==='all'&&currentStatus==='all'));
  });
  if(currentStatus==='all') document.getElementById('fc-all').classList.add('active');
  render();
}

function toggleExpand(id){
  if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card) card.classList.toggle('expanded', expanded.has(id));
}

function toggleDone(id,e){
  e.stopPropagation();
  const wasDone=doneSet.has(id);
  if(wasDone){doneSet.delete(id)}else{
    doneSet.add(id);
    todayDone++;
    localStorage.setItem('aik_today_done', todayDone);
    localStorage.setItem('aik_today_date', new Date().toDateString());
    confettiBurst(e.target);
  }
  saveDone();
  updateStats();
  buildNav();
  buildStatCards();
  const card=document.querySelector(`[data-id="${id}"]`);
  if(card){
    card.classList.toggle('done-card',!wasDone);
    const checks=card.querySelectorAll('.done-check,.mark-check');
    checks.forEach(c=>c.classList.toggle('checked',!wasDone));
    const labels=card.querySelectorAll('.mark-label');
    labels.forEach(l=>l.textContent=wasDone?'Mark as done':'Completed ✓');
    const title=card.querySelector('.task-title');
    if(title) title.style.textDecoration=wasDone?'none':'line-through';
  }
}

function confettiBurst(el){
  const rect=el.getBoundingClientRect();
  const colors=['#7c6aff','#2dd4a0','#f5a623','#22d3ee','#e879a4'];
  for(let i=0;i<8;i++){
    const dot=document.createElement('div');
    dot.className='confetti-dot';
    const size=4+Math.random()*5;
    dot.style.cssText=`width:${size}px;height:${size}px;background:${colors[i%colors.length]};left:${rect.left+rect.width/2+(-20+Math.random()*40)}px;top:${rect.top+window.scrollY}px;animation-delay:${Math.random()*0.2}s;animation-duration:${0.6+Math.random()*0.3}s`;
    document.body.appendChild(dot);
    setTimeout(()=>dot.remove(),1000);
  }
}

function getFiltered(){
  const search=document.getElementById('search').value.toLowerCase().trim();
  return TASKS.filter(t=>{
    if(currentCat!=='all'&&t.cat!==currentCat) return false;
    const prioFilter=['foundation','core','advanced','project'];
    if(prioFilter.includes(currentStatus)&&t.prio!==currentStatus) return false;
    if(currentStatus==='done'&&!doneSet.has(t.id)) return false;
    if(currentStatus==='todo'&&doneSet.has(t.id)) return false;
    if(search){
      const haystack=t.title.toLowerCase()+' '+t.tags.join(' ')+' '+t.phase.toLowerCase();
      if(!haystack.includes(search)) return false;
    }
    return true;
  });
}

function render(){
  const filtered=getFiltered();
  const container=document.getElementById('content');

  if(filtered.length===0){
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">◎</div><div class="empty-text">No tasks match your current filters.<br>Try clearing the search or changing the category.</div></div>`;
    return;
  }

  const phases={};
  filtered.forEach(t=>{
    if(!phases[t.phaseIdx]) phases[t.phaseIdx]={name:t.phase,tasks:[]};
    phases[t.phaseIdx].tasks.push(t);
  });

  let html='';
  Object.entries(phases).sort((a,b)=>a[0]-b[0]).forEach(([pi,group],gi)=>{
    const p=PHASES[pi]||{emoji:'📌',desc:''};
    const phDone=group.tasks.filter(t=>doneSet.has(t.id)).length;
    html+=`<div class="phase-group" style="animation-delay:${gi*0.06}s">
      <div class="phase-header">
        <div style="font-size:20px;line-height:1">${p.emoji}</div>
        <div>
          <div class="phase-name">${group.name}</div>
          <div class="phase-desc">${p.desc}</div>
        </div>
        <div class="phase-meta">
          <span class="phase-done-count">${phDone}/${group.tasks.length} done</span>
          <span class="phase-pill">do in order</span>
        </div>
      </div>`;
    group.tasks.forEach((t,ti)=>{
      const done=doneSet.has(t.id);
      const exp=expanded.has(t.id);
      const prioClass=`prio-${t.prio}`;
      const prioLabel=t.prio.toUpperCase();
      const catColor=CATS[t.cat]?.color||'#6b6d85';
      const stepHtml=t.howto.map((s,i)=>`<li class="step-item"><div class="step-num">${i+1}</div><div class="step-text">${s}</div></li>`).join('');
      const tagHtml=t.tags.slice(0,5).map(tg=>`<span class="tag">${tg}</span>`).join('');
      html+=`<div class="task-card ${exp?'expanded':''} ${done?'done-card':''}" data-id="${t.id}" onclick="toggleExpand(${t.id})" style="animation-delay:${gi*0.06+ti*0.03}s">
        <div class="task-top">
          <div class="task-order" style="color:${catColor}">${String(t.order).padStart(2,'0')}</div>
          <div class="task-mid">
            <div class="task-title-row">
              <div class="task-title" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${t.title}</div>
              <span class="prio-badge ${prioClass}">${prioLabel}</span>
            </div>
            <div class="task-tags-row">${tagHtml}</div>
          </div>
          <div class="task-right">
            <div class="done-check ${done?'checked':''}" onclick="toggleDone(${t.id},event)">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.2 7L8 3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="expand-arrow">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2L7 5L3 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
          </div>
        </div>
        <div class="task-detail">
          <div class="task-detail-inner">
            <div class="task-detail-body">
              <div class="detail-block">
                <div class="detail-block-title">Core concept</div>
                <div class="concept-card">${t.concept}</div>
              </div>
              <div class="detail-block">
                <div class="detail-block-title">How to do it — step by step</div>
                <ul class="steps-list">${stepHtml}</ul>
                <div class="mark-row" onclick="toggleDone(${t.id},event)">
                  <div class="mark-check ${done?'checked':''}">
                    ${done?'<svg width="9" height="9" viewBox="0 0 10 10" fill="none"><path d="M2 5L4.2 7L8 3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}
                  </div>
                  <span class="mark-label">${done?'Completed ✓':'Mark as done when finished'}</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  container.innerHTML=html;
}

buildNav();
buildStatCards();
updateStats();
render();
</script>
</body>
</html>
